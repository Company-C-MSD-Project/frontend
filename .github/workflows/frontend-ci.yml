name: Frontend CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Lint & Unit Tests (Vitest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fix_it_now

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: fix_it_now/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run unit tests
        run: npm run test

  deploy:
    name: Deploy to EC2
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-frontend-ec2
      cancel-in-progress: false
    env:
      EC2_HOST: "44.203.20.87"
      EC2_USER: "ec2-user"
      SITE: "https://fixitnow.chanupahansaja.me"
    defaults:
      run:
        working-directory: fix_it_now
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: fix_it_now/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build static SPA (same-origin API)
        env:
          BUILD_TARGET: spa
        run: |
          # Production env for the EC2 build: same-origin API (nginx proxies), new backend, maps key.
          {
            echo "VITE_API_BASE_URL_PROD="
            echo "VITE_USE_NEW_API=true"
            echo "VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}"
          } > .env.production.local
          npm run build
          test -f dist/client/_shell.html || { echo "::error::static SPA shell not produced"; exit 1; }
          tar -C dist -czf /tmp/frontend.tgz client

      - name: Set up SSH (pinned host key)
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          echo "${{ secrets.EC2_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Upload bundle to instance
        run: |
          scp -i ~/.ssh/id_deploy -o UserKnownHostsFile=~/.ssh/known_hosts -o IdentitiesOnly=yes \
            /tmp/frontend.tgz "$EC2_USER@$EC2_HOST:/tmp/frontend.tgz"

      - name: Deploy + smoke-check + rollback on failure
        run: |
          ssh -i ~/.ssh/id_deploy -o UserKnownHostsFile=~/.ssh/known_hosts -o IdentitiesOnly=yes \
            "$EC2_USER@$EC2_HOST" bash -s <<'EOSSH'
          set -e
          WEB=/var/www/fixitnow
          sudo tar -C /tmp -xzf /tmp/frontend.tgz
          sudo rm -rf "${WEB}.bak"; sudo cp -r "$WEB" "${WEB}.bak" || true
          sudo rm -rf "$WEB"/*; sudo cp -r /tmp/client/* "$WEB"/
          sudo chown -R nginx:nginx "$WEB"
          sudo nginx -t
          sudo systemctl reload nginx
          code=$(curl -s -o /dev/null -w '%{http_code}' -H 'Host: fixitnow.chanupahansaja.me' http://127.0.0.1/)
          if [ "$code" != "200" ]; then
            echo "Frontend smoke FAILED ($code) — rolling back"
            sudo rm -rf "$WEB"/*; sudo cp -r "${WEB}.bak"/* "$WEB"/
            sudo systemctl reload nginx
            exit 1
          fi
          echo "Frontend deployed and serving"
          EOSSH

      - name: System test (live HTTPS)
        run: |
          set -e
          c=$(curl -s -o /dev/null -w '%{http_code}' --max-time 25 "$SITE/")
          echo "GET $SITE/ -> $c"; [ "$c" = "200" ]
          # confirm the SPA shell (not a stale/default page) is served
          curl -s --max-time 25 "$SITE/login" | grep -qi "FixItNow" && echo "SPA shell OK"
          echo "✅ Frontend system tests passed"
